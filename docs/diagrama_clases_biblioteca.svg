<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1280"
     viewBox="0 0 1100 1280" font-family="monospace" font-size="12">

  <rect width="1100" height="1280" fill="white"/>

  <defs>
    <!-- Triángulo hueco para herencia: la PUNTA apunta al padre.
         El marker se coloca en marker-END de la línea, y la línea
         va de HIJO → PADRE, por lo que la punta queda en el extremo del padre. -->
    <marker id="herencia" viewBox="0 0 20 20" refX="19" refY="10"
            markerWidth="12" markerHeight="12" orient="auto">
      <polygon points="1,1 19,10 1,19" fill="white" stroke="black" stroke-width="1.5"/>
    </marker>
    <!-- Flecha abierta para asociación -->
    <marker id="asociacion" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="black" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- Flecha abierta para dependencia (igual forma, línea será punteada) -->
    <marker id="dependencia" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#555" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════════════════
       1. Persona  (abstract)
       Posición: x=380, y=20, w=340
  ═══════════════════════════════════════════════════════ -->
  <!-- compartimento nombre -->
  <rect x="380" y="20" width="340" height="44" fill="#f0f0f0" stroke="black" stroke-width="1.5"/>
  <text x="550" y="37" text-anchor="middle" font-style="italic" font-size="11" fill="#444">«abstract»</text>
  <text x="550" y="56" text-anchor="middle" font-weight="bold" font-style="italic" font-size="13">Persona</text>
  <!-- compartimento atributos -->
  <rect x="380" y="64" width="340" height="98" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="392" y="80"># id : int</text>
  <text x="392" y="96"># nombre : String</text>
  <text x="392" y="112"># clave : String</text>
  <text x="392" y="128"># direccion : String</text>
  <text x="392" y="144"># nTelefono : int</text>
  <!-- compartimento métodos -->
  <rect x="380" y="162" width="340" height="82" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="392" y="178">+ Persona(id, nombre, clave, dir, tel)</text>
  <text x="392" y="194">+ getId() : int</text>
  <text x="392" y="210">+ getNombre() : String</text>
  <text x="392" y="226">+ getClave() : String</text>
  <text x="392" y="242">+ getDireccion() / getnTelefono() : ...</text>

  <!-- ═══════════════════════════════════════════════════════
       2. Personal  (abstract)
       Posición: x=330, y=350, w=380
  ═══════════════════════════════════════════════════════ -->
  <rect x="330" y="350" width="380" height="44" fill="#f0f0f0" stroke="black" stroke-width="1.5"/>
  <text x="520" y="367" text-anchor="middle" font-style="italic" font-size="11" fill="#444">«abstract»</text>
  <text x="520" y="386" text-anchor="middle" font-weight="bold" font-style="italic" font-size="13">Personal</text>
  <!-- atributos -->
  <rect x="330" y="394" width="380" height="34" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="342" y="410"># salario : double</text>
  <text x="342" y="426">- numeroOficina : int</text>
  <!-- métodos -->
  <rect x="330" y="428" width="380" height="66" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="342" y="444">+ Personal(id, nombre, clave, dir, tel, sal, of)</text>
  <text x="342" y="460">+ listarPersonal(lista : List) : void</text>
  <text x="342" y="476">+ registrarMiembroStaff(lista, scan, tipo) : void</text>
  <text x="342" y="492">+ printInfo() : void</text>

  <!-- ═══════════════════════════════════════════════════════
       3. Lector
       Posición: x=720, y=350, w=340
  ═══════════════════════════════════════════════════════ -->
  <rect x="720" y="350" width="340" height="28" fill="#f0f0f0" stroke="black" stroke-width="1.5"/>
  <text x="890" y="369" text-anchor="middle" font-weight="bold" font-size="13">Lector</text>
  <!-- atributos (ninguno propio) -->
  <rect x="720" y="378" width="340" height="14" fill="white" stroke="black" stroke-width="1.5"/>
  <!-- métodos -->
  <rect x="720" y="392" width="340" height="130" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="732" y="408">+ Lector(id, nombre, clave, dir, tel)</text>
  <text x="732" y="424">+ registrarLector(lista, scan) : void</text>
  <text x="732" y="440">+ listarLectores(lista) : void</text>
  <text x="732" y="456">+ login(lista, scan) : Lector</text>
  <text x="732" y="472">+ menuLector(scan, nombre) : int</text>
  <text x="732" y="488">+ solicitarPrestamo(lector, libros,</text>
  <text x="748" y="504">  solicitudes, scan) : void</text>

  <!-- ═══════════════════════════════════════════════════════
       4. Bibliotecario
       Posición: x=60, y=620, w=300
  ═══════════════════════════════════════════════════════ -->
  <rect x="60" y="620" width="300" height="28" fill="#f0f0f0" stroke="black" stroke-width="1.5"/>
  <text x="210" y="639" text-anchor="middle" font-weight="bold" font-size="13">Bibliotecario</text>
  <!-- atributos (ninguno propio) -->
  <rect x="60" y="648" width="300" height="14" fill="white" stroke="black" stroke-width="1.5"/>
  <!-- métodos -->
  <rect x="60" y="662" width="300" height="34" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="72" y="678">+ Bibliotecario(id, nombre, clave,</text>
  <text x="88" y="694">  dir, tel, sal, of)</text>

  <!-- ═══════════════════════════════════════════════════════
       5. Oficinista
       Posición: x=430, y=620, w=280
  ═══════════════════════════════════════════════════════ -->
  <rect x="430" y="620" width="280" height="28" fill="#f0f0f0" stroke="black" stroke-width="1.5"/>
  <text x="570" y="639" text-anchor="middle" font-weight="bold" font-size="13">Oficinista</text>
  <!-- atributos (ninguno propio) -->
  <rect x="430" y="648" width="280" height="14" fill="white" stroke="black" stroke-width="1.5"/>
  <!-- métodos -->
  <rect x="430" y="662" width="280" height="34" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="442" y="678">+ Oficinista(id, nombre, clave,</text>
  <text x="458" y="694">  dir, tel, sal, of)</text>

  <!-- ═══════════════════════════════════════════════════════
       6. Libro
       Posición: x=60, y=860, w=380
  ═══════════════════════════════════════════════════════ -->
  <rect x="60" y="860" width="380" height="28" fill="#f0f0f0" stroke="black" stroke-width="1.5"/>
  <text x="250" y="879" text-anchor="middle" font-weight="bold" font-size="13">Libro</text>
  <!-- atributos -->
  <rect x="60" y="888" width="380" height="82" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="72" y="904">- idLibro : int</text>
  <text x="72" y="920">- titulo : String</text>
  <text x="72" y="936">- autor : String</text>
  <text x="72" y="952">- categoria : String</text>
  <text x="72" y="968">- estadoPrestamo : boolean</text>
  <!-- métodos -->
  <rect x="60" y="970" width="380" height="146" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="72" y="986">+ Libro(id, titulo, autor, cat)</text>
  <text x="72" y="1002">+ Libro(id, titulo, autor, cat, estado)</text>
  <text x="72" y="1018">+ listarLibros(lista) : void</text>
  <text x="72" y="1034">+ listarLibrosPrestados(lista) : void</text>
  <text x="72" y="1050">+ agregarLibro(lista, scan) : void</text>
  <text x="72" y="1066">+ editarLibro(lista, scan) : void</text>
  <text x="72" y="1082">+ cambiarInformacion(scan) : void</text>
  <text x="72" y="1098">+ generarSolicitud(lector) : Solcitud</text>
  <text x="72" y="1114">+ print() : void</text>

  <!-- ═══════════════════════════════════════════════════════
       7. Solcitud
       Posición: x=560, y=860, w=380
  ═══════════════════════════════════════════════════════ -->
  <rect x="560" y="860" width="380" height="28" fill="#f0f0f0" stroke="black" stroke-width="1.5"/>
  <text x="750" y="879" text-anchor="middle" font-weight="bold" font-size="13">Solcitud</text>
  <!-- atributos -->
  <rect x="560" y="888" width="380" height="50" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="572" y="904">- fechaSolicitud : LocalDate</text>
  <text x="572" y="920">- solicitante : Lector</text>
  <text x="572" y="936">- libro : Libro</text>
  <!-- métodos -->
  <rect x="560" y="938" width="380" height="82" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="572" y="954">+ Solcitud(fecha, lector, libro)</text>
  <text x="572" y="970">+ listarSolicitudes(lista) : void</text>
  <text x="572" y="986">+ print() : void</text>
  <text x="572" y="1002">+ getSolicitante() : Lector</text>
  <text x="572" y="1018">+ getLibro() : Libro</text>

  <!-- ═══════════════════════════════════════════════════════
       8. App
       Posición: x=330, y=1100, w=440
  ═══════════════════════════════════════════════════════ -->
  <rect x="330" y="1100" width="440" height="28" fill="#f0f0f0" stroke="black" stroke-width="1.5"/>
  <text x="550" y="1119" text-anchor="middle" font-weight="bold" font-size="13">App</text>
  <!-- atributos: ninguno -->
  <rect x="330" y="1128" width="440" height="14" fill="white" stroke="black" stroke-width="1.5"/>
  <!-- métodos -->
  <rect x="330" y="1142" width="440" height="114" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="342" y="1158">+ main(args : String[]) : void</text>
  <text x="342" y="1174">+ pantallaInicio(scan) : int</text>
  <text x="342" y="1190">+ adminOpt(scan) : int</text>
  <text x="342" y="1206">+ loginAdmin(scan) : boolean</text>
  <text x="342" y="1222">+ funcionesAdmin(opt, scan, personal,</text>
  <text x="358" y="1238">  libros, lectores, solicitudes) : void</text>
  <text x="342" y="1254">+ cargarStaff / cargarLectores / cargarLibros(...) : void</text>

  <!-- ═══════════════════════════════════════════════════════
       RELACIONES DE HERENCIA
       Regla UML: línea sólida, triángulo HUECO en el extremo del PADRE.
       La línea va de HIJO → PADRE con marker-end en lado padre.
  ═══════════════════════════════════════════════════════ -->

  <!-- Personal ──────▷ Persona
       Hijo: Personal, borde superior centro = (520, 350)
       Padre: Persona,  borde inferior centro = (550, 244) -->
  <polyline points="520,350  520,290  550,290  550,244"
            fill="none" stroke="black" stroke-width="1.5"
            marker-end="url(#herencia)"/>

  <!-- Lector ──────▷ Persona
       Hijo: Lector, borde superior centro = (890, 350)
       Padre: Persona, borde derecho centro ~ (720, 203) -->
  <polyline points="890,350  890,300  720,300  720,203  720,203"
            fill="none" stroke="black" stroke-width="1.5"
            marker-end="url(#herencia)"/>

  <!-- Bibliotecario ──────▷ Personal
       Hijo: Bibliotecario, borde superior centro = (210, 620)
       Padre: Personal, borde inferior centro = (520, 494) -->
  <polyline points="210,620  210,560  520,560  520,494"
            fill="none" stroke="black" stroke-width="1.5"
            marker-end="url(#herencia)"/>

  <!-- Oficinista ──────▷ Personal
       Hijo: Oficinista, borde superior centro = (570, 620)
       Padre: Personal, borde inferior centro = (520, 494) -->
  <polyline points="570,620  570,556  520,556  520,494"
            fill="none" stroke="black" stroke-width="1.5"
            marker-end="url(#herencia)"/>

  <!-- ═══════════════════════════════════════════════════════
       ASOCIACIONES
  ═══════════════════════════════════════════════════════ -->

  <!-- Libro::generarSolicitud crea Solcitud
       Asociación: Libro (1) ──────► Solcitud (0..*)
       Libro borde derecho = (440, 1044)
       Solcitud borde izquierdo = (560, 944) -->
  <line x1="440" y1="1044" x2="560" y2="944"
        stroke="black" stroke-width="1.5"
        marker-end="url(#asociacion)"/>
  <text x="444" y="1058" font-size="11">1</text>
  <text x="528" y="942" font-size="11">0..*</text>
  <text x="455" y="1010" font-size="10" fill="#333" font-style="italic">genera</text>

  <!-- Solcitud::solicitante → Lector
       Solcitud (atributo - solicitante : Lector)
       Solcitud borde superior = (750, 860)
       Lector borde inferior = (890, 522) -->
  <polyline points="860,860  860,800  990,800  990,522  1060,522"
            fill="none" stroke="black" stroke-width="1.5"
            marker-end="url(#asociacion)"/>
  <text x="863" y="856" font-size="11">0..*</text>
  <text x="1030" y="518" font-size="11">1</text>
  <text x="970" y="796" font-size="10" fill="#333" font-style="italic">solicitante</text>

  <!-- Solcitud::libro → Libro
       Solcitud borde izquierdo ~ (560, 920)
       Libro borde derecho ~ (440, 980) -->
  <polyline points="560,920  500,920  500,980  440,980"
            fill="none" stroke="black" stroke-width="1.5"
            marker-end="url(#asociacion)"/>
  <text x="540" y="916" font-size="11">*</text>
  <text x="444" y="976" font-size="11">1</text>
  <text x="460" y="948" font-size="10" fill="#333" font-style="italic">libro</text>

  <!-- ═══════════════════════════════════════════════════════
       DEPENDENCIAS  App  ·········►  clases que usa
       Línea punteada con flecha abierta
  ═══════════════════════════════════════════════════════ -->

  <!-- App ·········► Lector -->
  <polyline points="770,1100  890,1100  890,522"
            fill="none" stroke="#555" stroke-width="1.5"
            stroke-dasharray="7,4"
            marker-end="url(#dependencia)"/>

  <!-- App ·········► Personal -->
  <polyline points="550,1100  550,560  520,560  520,494"
            fill="none" stroke="#555" stroke-width="1.5"
            stroke-dasharray="7,4"
            marker-end="url(#dependencia)"/>

  <!-- App ·········► Libro -->
  <polyline points="400,1100  400,1060  440,1060"
            fill="none" stroke="#555" stroke-width="1.5"
            stroke-dasharray="7,4"
            marker-end="url(#dependencia)"/>

  <!-- App ·········► Solcitud -->
  <polyline points="770,1142  770,1080  1050,1080  1050,1020  940,1020"
            fill="none" stroke="#555" stroke-width="1.5"
            stroke-dasharray="7,4"
            marker-end="url(#dependencia)"/>

  <!-- ═══════════════════════════════════════════════════════
       LEYENDA
  ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="1160" width="280" height="100" fill="#fafafa" stroke="#aaa" stroke-width="1"/>
  <text x="30" y="1178" font-weight="bold" font-size="12">Leyenda</text>

  <!-- herencia -->
  <line x1="30" y1="1200" x2="100" y2="1200" stroke="black" stroke-width="1.5" marker-end="url(#herencia)"/>
  <text x="108" y="1204" font-size="11">Herencia (extends)</text>

  <!-- asociacion -->
  <line x1="30" y1="1220" x2="100" y2="1220" stroke="black" stroke-width="1.5" marker-end="url(#asociacion)"/>
  <text x="108" y="1224" font-size="11">Asociación dirigida</text>

  <!-- dependencia -->
  <line x1="30" y1="1240" x2="100" y2="1240" stroke="#555" stroke-width="1.5"
        stroke-dasharray="7,4" marker-end="url(#dependencia)"/>
  <text x="108" y="1244" font-size="11">Dependencia (usa)</text>

  <!-- visibilidad -->
  <text x="30" y="1256" font-size="11">+ público  – privado  # protegido</text>

</svg>
